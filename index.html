<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유수언 - 통합 플레이어</title>
    <style>
        body, html {
            margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif;
            min-height: 100vh;
            /* Pages 폴더 내의 배경 이미지 사용 */
            background-image: url('bg.jpg');
            background-attachment: fixed; background-position: center;
            background-repeat: no-repeat; background-size: cover;
        }
        .full-overlay {
            min-height: 100vh; background-color: rgba(255, 255, 255, 0.5);
            display: flex; flex-direction: column; align-items: center;
        }
        .top-logo-container { width: 100%; text-align: center; padding: 40px 0; }
        .top-logo { max-width: 300px; height: auto; }
        .player-section {
            width: 90%; max-width: 800px; position: sticky; top: 10px; z-index: 100;
            background: rgba(255, 255, 255, 0.8); padding: 15px; border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); margin-bottom: 20px;
        }
        video { width: 100%; border-radius: 10px; background: #000; }
        #currentTitle { margin: 10px 0 0 0; text-align: center; color: #333; }
        .list-section { width: 90%; max-width: 600px; padding-bottom: 50px; }
        .season-box {
            border: 2px solid #333; padding: 10px; margin: 30px 0 10px;
            font-weight: bold; text-align: center; background: rgba(238, 238, 238, 0.9);
            border-radius: 5px;
        }
        .episode-btn {
            display: flex; justify-content: space-between; align-items: center; padding: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.1); cursor: pointer;
            background: rgba(255, 255, 255, 0.6); margin-bottom: 2px;
        }
        /* 방영 예정 날짜 스타일 */
        .air-date {
            font-size: 0.85em;
            color: #777; /* 회색 */
            font-weight: normal;
        }
       
        /*  상단 글귀  */
        .notice-text {
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <div class="full-overlay">
        <div class="top-logo-container">
            <img src="logo.webp" alt="한자로고" class="top-logo">
        </div>
        <div class="player-section">
            <video id="mainPlayer" controls playsinline preload="metadata">
                <source id="videoSource" src="" type="video/mp4">
            </video>
            <h3 id="currentTitle">화수를 선택해 주세요 
(유수언 애니 번역해주실 분 모집합니다, 관심있으신 분들은 연락주세요!) https://open.kakao.com/o/sZFtOQKg</h3>
        </div>
       
        <div id="contentList" class="list-section">
            <div class="notice-text">
                  
            </div>
        </div>
    </div>

    <script>
        const player = document.getElementById('mainPlayer');
        const source = document.getElementById('videoSource');
        const titleText = document.getElementById('currentTitle');
        const contentList = document.getElementById('contentList');

        // 영상 서버 (R2 서브도메인)
        const R2_URL = "https://media.fabulousbeasts.kr";

        const seasons = [
            { name: "시즌 1", start: 1, end: 12 },
            { name: "시즌 2", start: 13, end: 24 },
            { name: "시즌 3", start: 25, end: 36 },
            { name: "시즌 4", start: 37, end: 48 },
            { name: "시즌 5", start: 49, end: 60 }
        ];

        // 2026년 날짜 계산 함수
        function getAirDate(episodeNum) {
            if (episodeNum < 49) return "";
           
            // 기준: 49화 - 2026년 2월 20일
            // 자바스크립트 Date 객체에서 월은 0부터 시작 (0:1월, 1:2월)
            const baseDate = new Date(2026, 1, 20);
            const weeksToAdd = episodeNum - 49;
            baseDate.setDate(baseDate.getDate() + (weeksToAdd * 7));
           
            return `${baseDate.getMonth() + 1}월 ${baseDate.getDate()}일 방영 예정`;
        }

        seasons.forEach(s => {
            let box = document.createElement('div');
            box.className = 'season-box';
            box.innerText = s.name;
            contentList.appendChild(box);

            for (let i = s.start; i <= s.end; i++) {
                let item = document.createElement('div');
                item.className = 'episode-btn';
               
                const dateInfo = getAirDate(i);
                item.innerHTML = `
                    <span>${i}화</span>
                    ${dateInfo ? `<span class="air-date">${dateInfo}</span>` : ""}
                `;

                item.onclick = function() {
                    const fileName = encodeURIComponent(i + "화.mp4");
                    const videoFullUrl = `${R2_URL}/${fileName}`;
                   
                    source.src = videoFullUrl;
                    titleText.innerText = i + "화 재생 중...  (유수언 애니 번역해주실 분 모집합니다, 관심있으신 분들은 연락주세요!) https://open.kakao.com/o/sZFtOQKg ";
                   
                    player.load();
                    player.play().catch(e => {
                        titleText.innerText = i + "화 (파일이 없거나 불러올 수 없습니다) (유수언 애니 번역해주실 분 모집합니다, 관심있으신 분들은 연락주세요!) https://open.kakao.com/o/sZFtOQKg";
                    });
                    window.scrollTo({top: document.querySelector('.player-section').offsetTop - 20, behavior: 'smooth'});
                };
                contentList.appendChild(item);
            }
        });
    </script>
</body>
</html>
